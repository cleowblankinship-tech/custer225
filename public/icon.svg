<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hand-drawn wobble: gentle displacement on all strokes/fills -->
    <filter id="sk" x="-4%" y="-4%" width="108%" height="108%">
      <feTurbulence type="fractalNoise" baseFrequency="0.032" numOctaves="4" seed="7" result="n"/>
      <feDisplacementMap in="SourceGraphic" in2="n" scale="4" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>

  <!-- Warm paper background -->
  <rect width="512" height="512" fill="#FFF8EF"/>

  <g filter="url(#sk)">

    <!-- Chimney (behind roof in z-order) -->
    <rect x="300" y="114" width="38" height="62" rx="4"
      fill="#C05A42" stroke="#2A1F14" stroke-width="5.5"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- House body: coral red, very slightly irregular polygon -->
    <polygon points="147,244 365,242 363,422 149,421"
      fill="#D96B4A" stroke="#2A1F14" stroke-width="5.5"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Roof: dusty blue, apex slightly off-center for hand-drawn feel -->
    <polygon points="115,252 258,85 395,246"
      fill="#7B9CB3" stroke="#2A1F14" stroke-width="6"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Window: pale warm yellow with cross bars -->
    <rect x="166" y="264" width="68" height="58" rx="5"
      fill="#FDE8A0" stroke="#2A1F14" stroke-width="4.5"
      stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="200" y1="264" x2="200" y2="322"
      stroke="#2A1F14" stroke-width="3.5" stroke-linecap="round"/>
    <line x1="166" y1="293" x2="234" y2="293"
      stroke="#2A1F14" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Door: warm amber, arch top -->
    <!-- Arch bounding box (221,316,70,70): center (256,351) radius 35 -->
    <!-- Path: left wall up → arch over top → right wall down → bottom -->
    <path d="M 221,422 L 221,351
             A 35,35 0 0 1 291,351
             L 291,422 Z"
      fill="#F2B230" stroke="#2A1F14" stroke-width="5"
      stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Door knob -->
    <circle cx="282" cy="378" r="7" fill="#2A1F14"/>

  </g>
</svg>
